<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wireframe globe -->
  <circle cx="50" cy="50" r="42" fill="#0d0d12" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="42" ry="12" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="42" ry="25" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="42" ry="35" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  
  <!-- Longitude lines -->
  <ellipse cx="50" cy="50" rx="12" ry="42" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="25" ry="42" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="35" ry="42" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  
  <!-- Warning triangle overlay -->
  <path d="M50 18 L78 68 L22 68 Z" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="50" y="60" text-anchor="middle" fill="#ef4444" font-size="28" font-weight="bold">!</text>
  
  <!-- Outer warning ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="8 4" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </circle>
</svg>