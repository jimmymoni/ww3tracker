<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Connection nodes representing conflict spread -->
  <circle cx="50" cy="15" r="5" fill="#ef4444"/>
  <circle cx="80" cy="35" r="4" fill="#fbbf24"/>
  <circle cx="75" cy="70" r="6" fill="#ef4444"/>
  <circle cx="40" cy="80" r="4" fill="#fbbf24"/>
  <circle cx="20" cy="50" r="5" fill="#ef4444"/>
  <circle cx="35" cy="35" r="3" fill="#3b82f6"/>
  
  <!-- Connection lines -->
  <line x1="50" y1="15" x2="80" y2="35" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="80" y1="35" x2="75" y2="70" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="75" y1="70" x2="40" y2="80" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="80" x2="20" y2="50" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="50" x2="50" y2="15" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="35" y1="35" x2="50" y2="15" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="35" x2="20" y2="50" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  
  <!-- Center -->
  <circle cx="50" cy="50" r="8" fill="#0d0d12" stroke="#3b82f6" stroke-width="2"/>
  <text x="50" y="54" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold" font-family="monospace">W</text>
  
  <!-- Pulsing rings around hotspots -->
  <circle cx="50" cy="15" r="8" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="5;12;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>