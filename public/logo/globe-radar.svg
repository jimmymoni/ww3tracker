<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#0d0d12" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Globe grid lines -->
  <ellipse cx="50" cy="50" rx="45" ry="20" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="20" ry="45" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="5" y1="50" x2="95" y2="50" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="50" y1="5" x2="50" y2="95" stroke="#1e3a5f" stroke-width="1"/>
  
  <!-- Radar sweep animation -->
  <path d="M50 50 L50 5 A45 45 0 0 1 95 50 Z" fill="url(#radarGradient)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Conflict hotspots -->
  <circle cx="35" cy="40" r="4" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="35" r="3" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="60" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Center pulse -->
  <circle cx="50" cy="50" r="3" fill="#3b82f6">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <defs>
    <linearGradient id="radarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>
</svg>