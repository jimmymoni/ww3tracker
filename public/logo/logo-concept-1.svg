<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Concept 1: Globe with Breaking Chains -->
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Globe -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#globeGrad)" stroke-width="3"/>
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="15" ry="40" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Breaking chain link -->
  <path d="M30 35 L35 40 M35 35 L30 40" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <path d="M65 60 L70 65 M70 60 L65 65" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center warning -->
  <circle cx="50" cy="50" r="8" fill="#fbbf24"/>
  <path d="M50 45 L50 52 M50 54 L50 55" stroke="#0d0d12" stroke-width="2" stroke-linecap="round"/>
</svg>