<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#0d0d12" stroke="#dc2626" stroke-width="2"/>
  
  <!-- US flag emoji representation -->
  <text x="28" y="58" font-size="32" text-anchor="middle">🦅</text>
  
  <!-- VS text -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">VS</text>
  
  <!-- Iran skull emoji representation -->
  <text x="72" y="58" font-size="32" text-anchor="middle">☠️</text>
  
  <!-- Live indicator dot -->
  <circle cx="75" cy="25" r="8" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>